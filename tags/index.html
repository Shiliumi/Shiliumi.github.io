                console.log('PJAX: 开始加载页面，显示进度条');
                topbar.show();
                
                
                setTimeout(function() { topbar.progress(0.3); }, 200);
                setTimeout(function() { topbar.progress(0.6); }, 400);
                setTimeout(function() { topbar.progress(0.8); }, 600);
            });

            
            document.addEventListener('pjax:complete', function() {
                console.log('PJAX: 页面加载完成，准备隐藏进度条');
                
                
                topbar.progress(1.0);
                
                
                setTimeout(function() {
                    
                    if (window.Stack && window.Stack.init) {
                        window.Stack.init();
                    }
                    
                    topbar.hide();
                    console.log('PJAX: 进度条已隐藏');
                }, 800); 
            });

            
            document.addEventListener('pjax:error', function() {
                console.log('PJAX: 页面加载失败，准备隐藏进度条');
                setTimeout(function() {
                    topbar.hide();
                    console.log('PJAX: 进度条已隐藏（错误）');
                }, 500); 
            });
        } else {
            console.error('Topbar library not loaded');
        }

        
        if (pjax) {
    pjax._handleResponse = pjax.handleResponse;
    pjax.handleResponse = function(responseText, request, href, options) {
        if (request.responseText.match("<html")) {
            if (responseText) {
                
                let newDom = new DOMParser().parseFromString(responseText, 'text/html');
                
                let bodyClass = newDom.body.className;
                        document.body.setAttribute("class", bodyClass);
            }
            
            pjax._handleResponse(responseText, request, href, options);
                    setTimeout(() => {
                pjax._handleResponse(responseText, request, href, options);
                    }, 1000);
        } else {
            
                    console.warn('PJAX: 收到非HTML响应');
        }
            };
        }
        
        if (typeof topbar !== 'undefined') {
            
            window.addEventListener('beforeunload', function() {
        topbar.show();
            });

            
            window.addEventListener('load', function() {
                setTimeout(function() {
        topbar.hide();
                }, 1000);
            });
        }
    });
</script>



<script>
    async function renderKaTeX() {
        
        let katex = document.querySelector(".math-katex");
        if (!katex) {
            return;
        }
        
        while (typeof renderMathInElement !== 'function') {
            await delay(500);
        }        
        
        renderMathInElement(document.body, {
            delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "$", right: "$", display: false },
                { left: "\\(", right: "\\)", display: false },
                { left: "\\[", right: "\\]", display: true }
            ],
            ignoredClasses: ["gist"]
        });
    }
    
    

    function delay(time) {
        return new Promise(resolve => {
            setTimeout(resolve, time)
        })
    }

    document.addEventListener('pjax:complete', () => {
        renderKaTeX();
    })
</script>

      loadExternalResource(config.path.cssPath, "css"),
      loadExternalResource(config.path.live2dCorePath, "js"),
      loadExternalResource(config.path.live2dSdkPath, "js"),
      loadExternalResource(config.path.tipsJsPath, "js")
    ]).then(() => {
      initWidget({
        waifuPath: config.path.tipsJsonPath,
        cdnPath: config.path.modelPath,
        tools: config.tools,
        dragEnable: config.drag.enable,
        dragDirection: config.drag.direction,
        switchType: config.switchType
      });
    });
  }

  
  function loadExternalResource(url, type) {
    return new Promise((resolve, reject) => {
      let tag;
      if (type === "css") {
        tag = document.createElement("link");
        tag.rel = "stylesheet";
        tag.href = url;
      }
      else if (type === "js") {
        tag = document.createElement("script");
        tag.src = url;
      }
      if (tag) {
        tag.onload = () => resolve(url);
        tag.onerror = () => reject(url);
        document.head.appendChild(tag);
      }
    });
  }
</script>

    </body>
</html>
