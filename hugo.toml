baseURL = 'https://shiliumi.github.io/'
languageCode = 'zh-CN'
title = 'Shiliumi的个人博客'
theme = 'hugo-theme-reimu-0.12.1'
defaultContentLanguage = 'zh-CN'

[languages]
[languages.zh-CN]
languageName = '简体中文'
weight = 1
hasCJKLanguage = true

[markup.highlight]
guessSyntax = true
noClasses = false

[markup.goldmark.extensions.passthrough]
enable = true
delimiters.block = [["\\[", "\\]"], ["$$", "$$"]]
delimiters.inline = [["\\(", "\\)"], ["$", "$"]]

[outputs]
home = ["HTML", "RSS"]
